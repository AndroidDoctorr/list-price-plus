name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck extension
        run: pnpm --filter list-price-plus-extension compile

      - name: Typecheck core
        run: pnpm --filter @list-price-plus/core compile

      - name: Test core engine
        run: pnpm --filter @list-price-plus/core test

      - name: Build web
        run: pnpm --filter list-price-plus-web build

      - name: Build extension (Chrome + Firefox)
        run: pnpm --filter list-price-plus-extension build:all

      - name: Test extension adapters
        run: pnpm --filter list-price-plus-extension test
