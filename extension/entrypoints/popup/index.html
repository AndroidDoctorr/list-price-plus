<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List Price Plus</title>
    <meta name="manifest.type" content="browser_action" />
  </head>
  <body>
    <main class="popup">
      <h1>List Price Plus</h1>
      <p class="tagline">True property costs on listing sites.</p>

      <label class="toggle">
        <input id="enabled" type="checkbox" checked />
        <span>Enabled</span>
      </label>
      <p id="status" class="status">Extension is enabled.</p>
      <p id="page-status" class="page-status">Checking current page…</p>

      <section class="profile-section">
        <h2>Your assumptions</h2>

        <label class="field">
          <span>Spending style</span>
          <select id="spendingStyle">
            <option value="thrifty">Thrifty</option>
            <option value="standard" selected>Standard</option>
            <option value="comfortable">Comfortable</option>
          </select>
        </label>

        <label class="field">
          <span>Credit tier</span>
          <select id="creditTier">
            <option value="excellent">Excellent (760+)</option>
            <option value="good" selected>Good (700–759)</option>
            <option value="fair">Fair (640–699)</option>
            <option value="poor">Poor (&lt;640)</option>
          </select>
        </label>

        <label class="field">
          <span>Down payment %</span>
          <input id="downPayment" type="number" min="0" max="100" step="1" value="20" />
        </label>

        <label class="field">
          <span>Loan term</span>
          <select id="loanTerm">
            <option value="30" selected>30 years</option>
            <option value="20">20 years</option>
            <option value="15">15 years</option>
          </select>
        </label>
      </section>

      <section class="profile-section realtor-section">
        <label class="toggle">
          <input id="realtorMode" type="checkbox" />
          <span>Realtor mode</span>
        </label>
        <p class="hint">Shows “Share with client” on listings and uses your branding on PDFs and links.</p>

        <h2>Realtor profile</h2>

        <label class="field">
          <span>Your name</span>
          <input id="agentName" type="text" autocomplete="name" placeholder="Jane Smith" />
        </label>

        <label class="field">
          <span>Brokerage</span>
          <input id="agentBrokerage" type="text" autocomplete="organization" placeholder="Acme Realty" />
        </label>

        <label class="field">
          <span>Phone</span>
          <input id="agentPhone" type="tel" autocomplete="tel" placeholder="(555) 555-5555" />
        </label>

        <label class="field">
          <span>Email</span>
          <input id="agentEmail" type="email" autocomplete="email" placeholder="jane@example.com" />
        </label>

        <label class="field">
          <span>Logo URL (optional)</span>
          <input id="agentLogoUrl" type="url" placeholder="https://…" />
        </label>
      </section>

      <p class="version">v0.1.0</p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
